    <!-- Removed Firestore preconnect after migrating to Supabase -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; }
      input, select, textarea { font-size: 16px !important; }
      button, a { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
      body { overscroll-behavior-y: contain; }
      #root:empty { display:flex; justify-content:center; align-items:center; min-height:100vh; background:linear-gradient(135deg,#DC2626,#991B1B); }
      #root:empty::after { content:''; width:40px; height:40px; border:3px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; }
      @keyframes spin { to { transform:rotate(360deg); } }
